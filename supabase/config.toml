# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "open-bsp-api"

[api]
schemas = ["public", "storage", "billing"]

[functions.whatsapp-webhook]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/whatsapp-webhook/index.ts"

[functions.instagram-webhook]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/instagram-webhook/index.ts"

[functions.whatsapp-management]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/whatsapp-management/index.ts"

[functions.media-preprocessor]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/media-preprocessor/index.ts"

[functions.agent-client]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/agent-client/index.ts"

[functions.whatsapp-dispatcher]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/whatsapp-dispatcher/index.ts"

[functions.mcp]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/mcp/index.ts"

[functions.test-outbound]
enabled = true
verify_jwt = false
import_map = "./functions/test-outbound/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/test-outbound/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/test-outbound/*.html" ]

[functions.manage-webhooks]
enabled = true
verify_jwt = false
import_map = "./functions/manage-webhooks/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/manage-webhooks/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/manage-webhooks/*.html" ]
